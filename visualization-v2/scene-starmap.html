<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人形机器人工业场景星图 v3.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Three.js 核心 -->
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <!-- 3d-force-graph -->
    <script src="https://unpkg.com/3d-force-graph@1.73.0/dist/3d-force-graph.min.js"></script>
    <!-- Three.js 后处理模块 -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            background: #050510;
            color: #e0e0e0;
            overflow: hidden;
            height: 100vh;
        }

        #app { display: flex; height: 100vh; }

        /* 左侧筛选面板 240px */
        #filter-panel {
            width: 240px;
            background: rgba(8, 10, 20, 0.95);
            border-right: 1px solid rgba(255,255,255,0.06);
            padding: 16px;
            overflow-y: auto;
            transition: width 0.3s ease;
            z-index: 100;
            flex-shrink: 0;
        }
        #filter-panel.collapsed { width: 48px; padding: 16px 8px; }
        #filter-panel.collapsed .panel-content { display: none; }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .panel-title {
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            letter-spacing: 0.5px;
        }
        .toggle-btn {
            width: 28px; height: 28px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 6px;
            color: #666;
            cursor: pointer;
            font-size: 12px;
        }
        .toggle-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

        .filter-section { margin-bottom: 24px; }
        .filter-label {
            font-size: 10px;
            color: #444;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .industry-select {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 8px;
            max-height: 180px;
            overflow-y: auto;
        }
        .industry-item {
            display: flex;
            align-items: center;
            padding: 5px 4px;
            cursor: pointer;
            font-size: 11px;
            border-radius: 4px;
            transition: background 0.15s;
        }
        .industry-item:hover { background: rgba(255,255,255,0.03); }
        .industry-checkbox {
            width: 14px; height: 14px;
            margin-right: 8px;
            accent-color: #4a9eff;
        }
        .industry-color {
            width: 8px; height: 8px;
            border-radius: 50%;
            margin-right: 8px;
            flex-shrink: 0;
        }
        .industry-name { flex: 1; color: #888; }
        .industry-count {
            font-size: 10px;
            color: #444;
            font-family: monospace;
        }

        .range-slider { margin-bottom: 12px; }
        .range-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }
        .range-name { font-size: 11px; color: #666; }
        .range-value { font-size: 10px; color: #4a9eff; font-family: monospace; }
        input[type="range"] {
            width: 100%;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.06);
            height: 4px;
            border-radius: 2px;
            margin: 4px 0;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px; height: 12px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 6px rgba(74,158,255,0.5);
        }

        .stats-panel {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: 8px;
            padding: 12px;
            margin-top: 20px;
        }
        .stats-row {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            padding: 4px 0;
        }
        .stats-label { color: #555; }
        .stats-value { color: #4a9eff; font-family: monospace; }

        /* 3D图容器 */
        #graph-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #050510;
        }

        /* 悬停信息面板 (定位在节点旁边) */
        #hover-panel {
            position: fixed;
            width: 280px;
            background: rgba(8, 10, 25, 0.94);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 18px;
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 0.2s ease, transform 0.2s ease;
            pointer-events: none;
            backdrop-filter: blur(16px);
            z-index: 200;
        }
        #hover-panel.visible {
            opacity: 1;
            transform: scale(1);
        }
        .hover-name-zh {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
            line-height: 1.3;
        }
        .hover-name-en {
            font-size: 11px;
            color: #555;
            font-family: monospace;
            margin-bottom: 14px;
        }
        .hover-tags {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
        }
        .hover-tag {
            font-size: 10px;
            padding: 4px 10px;
            border-radius: 12px;
            color: #fff;
        }
        .hover-scores {
            display: flex;
            gap: 4px;
        }
        .hover-score-block {
            flex: 1;
            text-align: center;
            padding: 8px 2px;
            border-radius: 6px;
            min-width: 32px;
        }
        .hover-score-block .score-val {
            font-size: 15px;
            font-weight: 700;
            font-family: monospace;
        }
        .hover-score-block .score-lbl {
            font-size: 9px;
            color: #666;
            margin-top: 3px;
        }
        .score-low { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
        .score-mid { background: rgba(234, 179, 8, 0.15); color: #eab308; }
        .score-high { background: rgba(34, 197, 94, 0.15); color: #22c55e; }

        /* 详情卡片 */
        #detail-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(3, 3, 12, 0.92);
            backdrop-filter: blur(12px);
            z-index: 300;
            display: none;
            justify-content: center;
            align-items: center;
        }
        #detail-overlay.visible { display: flex; }

        #detail-card {
            width: 800px;
            max-height: 88vh;
            background: rgba(10, 12, 28, 0.96);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            overflow: hidden;
            animation: cardFadeIn 0.35s ease;
        }
        @keyframes cardFadeIn {
            from { transform: scale(0.94) translateY(20px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }

        .detail-header {
            padding: 24px 28px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .detail-title-zh {
            font-size: 24px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 6px;
        }
        .detail-title-en {
            font-size: 12px;
            color: #555;
            font-family: monospace;
        }
        .detail-tags {
            margin-top: 14px;
            display: flex;
            gap: 8px;
        }
        .detail-tag {
            font-size: 11px;
            padding: 5px 14px;
            border-radius: 14px;
            background: rgba(255,255,255,0.06);
            color: #aaa;
        }
        .close-btn {
            width: 36px; height: 36px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 50%;
            color: #666;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .close-btn:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }

        .detail-body {
            display: flex;
            padding: 28px;
            gap: 32px;
            max-height: calc(88vh - 160px);
            overflow-y: auto;
        }
        .detail-left {
            width: 300px;
            flex-shrink: 0;
        }
        .radar-container {
            width: 280px;
            height: 280px;
            margin: 0 auto;
        }
        .quadrant-info {
            text-align: center;
            margin-top: 16px;
            padding: 12px;
            background: rgba(255,255,255,0.02);
            border-radius: 8px;
            font-size: 13px;
            color: #777;
        }

        .detail-right { flex: 1; }
        .info-block { margin-bottom: 24px; }
        .info-block-title {
            font-size: 10px;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .info-block-content {
            font-size: 14px;
            line-height: 1.8;
            color: #bbb;
        }

        .process-chain {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
        }
        .process-step {
            padding: 5px 12px;
            background: rgba(255,255,255,0.04);
            border-radius: 6px;
            font-size: 12px;
            color: #777;
        }
        .process-step.current {
            background: rgba(74, 158, 255, 0.2);
            color: #4a9eff;
            font-weight: 500;
        }
        .process-arrow { color: #333; font-size: 10px; }

        .score-row {
            display: flex;
            align-items: flex-start;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .score-name {
            width: 110px;
            font-size: 12px;
            color: #666;
        }
        .score-num {
            width: 28px;
            font-size: 16px;
            font-weight: 600;
            font-family: monospace;
        }
        .score-basis {
            flex: 1;
            font-size: 12px;
            color: #555;
            line-height: 1.5;
        }
        .sn-1, .sn-2 { color: #ef4444; }
        .sn-3 { color: #eab308; }
        .sn-4, .sn-5 { color: #22c55e; }

        .detail-footer {
            padding: 16px 28px;
            border-top: 1px solid rgba(255,255,255,0.06);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }
        .nav-btn {
            width: 40px; height: 40px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 50%;
            color: #666;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .nav-btn:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        .nav-btn:disabled { opacity: 0.25; cursor: not-allowed; }
        .nav-info {
            font-size: 13px;
            color: #555;
            font-family: monospace;
        }

        /* 控制提示 */
        #controls-hint {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 10px;
            color: #333;
            text-align: right;
            line-height: 1.8;
        }
        #controls-hint kbd {
            display: inline-block;
            padding: 3px 6px;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
            font-family: monospace;
            margin: 0 2px;
        }

        /* 数据状态标识 */
        .data-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            margin-left: 8px;
        }
        .badge-full { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #000; }
        .badge-l3 { background: rgba(74, 158, 255, 0.3); color: #4a9eff; border: 1px solid #4a9eff; }
        .badge-guide { background: rgba(34, 197, 94, 0.3); color: #22c55e; border: 1px solid #22c55e; }

        /* Tab 导航 */
        .detail-tabs {
            display: flex;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            padding: 0 28px;
            gap: 4px;
        }
        .detail-tab {
            padding: 12px 20px;
            font-size: 13px;
            color: #666;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            background: none;
            border-top: none;
            border-left: none;
            border-right: none;
        }
        .detail-tab:hover { color: #aaa; }
        .detail-tab.active {
            color: #4a9eff;
            border-bottom-color: #4a9eff;
        }
        .detail-tab.disabled {
            color: #333;
            cursor: not-allowed;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* 元动作时间线 */
        .action-timeline {
            position: relative;
            padding-left: 24px;
        }
        .action-timeline::before {
            content: '';
            position: absolute;
            left: 8px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: rgba(255,255,255,0.1);
        }
        .action-step {
            position: relative;
            padding: 12px 0 12px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .action-step::before {
            content: '';
            position: absolute;
            left: -20px;
            top: 18px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4a9eff;
            border: 2px solid #050510;
        }
        .action-step-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }
        .action-step-num {
            font-size: 11px;
            color: #4a9eff;
            font-family: monospace;
            background: rgba(74,158,255,0.1);
            padding: 2px 6px;
            border-radius: 4px;
        }
        .action-step-desc {
            font-size: 13px;
            color: #bbb;
            line-height: 1.5;
        }
        .action-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }
        .action-tag {
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 4px;
            font-family: monospace;
        }
        .tag-l1 { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
        .tag-l2 { background: rgba(234, 179, 8, 0.15); color: #eab308; }
        .tag-l3 { background: rgba(34, 197, 94, 0.15); color: #22c55e; }
        .tag-duration { background: rgba(255,255,255,0.05); color: #666; }

        /* L2使用统计 */
        .l2-stats {
            background: rgba(255,255,255,0.02);
            border-radius: 8px;
            padding: 16px;
            margin-top: 16px;
        }
        .l2-stats-title {
            font-size: 11px;
            color: #555;
            margin-bottom: 12px;
        }
        .l2-tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .l2-tag {
            font-size: 11px;
            padding: 4px 10px;
            background: rgba(234, 179, 8, 0.1);
            color: #eab308;
            border-radius: 4px;
        }

        /* 建设指南样式 */
        .guide-phases {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
        }
        .guide-phase {
            flex: 1;
            background: rgba(255,255,255,0.02);
            border-radius: 8px;
            padding: 14px;
            border-left: 3px solid;
        }
        .phase-1 { border-color: #22c55e; }
        .phase-2 { border-color: #eab308; }
        .phase-3 { border-color: #4a9eff; }
        .guide-phase-title {
            font-size: 12px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 8px;
        }
        .guide-phase-content {
            font-size: 12px;
            color: #888;
            line-height: 1.6;
        }

        .guide-difficulties {
            margin-bottom: 20px;
        }
        .difficulty-item {
            padding: 12px;
            background: rgba(255,255,255,0.02);
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .difficulty-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }
        .difficulty-step {
            font-size: 10px;
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .difficulty-name {
            font-size: 13px;
            color: #fff;
        }
        .difficulty-method {
            font-size: 12px;
            color: #777;
            line-height: 1.5;
        }

        .guide-conditions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }
        .condition-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: rgba(255,255,255,0.02);
            border-radius: 6px;
            font-size: 12px;
        }
        .condition-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .status-ok { background: #22c55e; }
        .status-no { background: #ef4444; }
        .status-check { background: #eab308; }
        .condition-name { color: #aaa; }

        /* 无数据提示 */
        .no-data {
            text-align: center;
            padding: 40px;
            color: #444;
        }
        .no-data-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .no-data-text {
            font-size: 14px;
        }

        /* 建设指南子Tab */
        .guide-subtabs {
            display: flex;
            gap: 4px;
            margin-bottom: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            padding-bottom: 8px;
        }
        .guide-subtab {
            padding: 8px 16px;
            font-size: 12px;
            color: #666;
            cursor: pointer;
            border-radius: 6px 6px 0 0;
            background: none;
            border: none;
            transition: all 0.2s;
        }
        .guide-subtab:hover { color: #aaa; background: rgba(255,255,255,0.02); }
        .guide-subtab.active { color: #4a9eff; background: rgba(74,158,255,0.1); }
        .guide-subcontent { display: none; }
        .guide-subcontent.active { display: block; }

        /* 场景画像样式 */
        .portrait-section {
            background: rgba(255,255,255,0.02);
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 12px;
        }
        .portrait-title {
            font-size: 11px;
            color: #4a9eff;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .portrait-content {
            font-size: 13px;
            color: #999;
            line-height: 1.7;
        }

        /* 避坑指南样式 */
        .pitfall-item {
            background: rgba(239, 68, 68, 0.05);
            border-left: 3px solid #ef4444;
            border-radius: 0 8px 8px 0;
            padding: 14px;
            margin-bottom: 12px;
        }
        .pitfall-title {
            font-size: 14px;
            font-weight: 600;
            color: #ef4444;
            margin-bottom: 10px;
        }
        .pitfall-row {
            margin-bottom: 8px;
        }
        .pitfall-label {
            font-size: 10px;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .pitfall-text {
            font-size: 12px;
            color: #aaa;
            line-height: 1.6;
        }

        /* 经济性分析样式 */
        .economics-section {
            background: rgba(34, 197, 94, 0.05);
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 12px;
        }
        .economics-title {
            font-size: 12px;
            font-weight: 600;
            color: #22c55e;
            margin-bottom: 10px;
        }
        .cost-item {
            display: flex;
            gap: 12px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .cost-item:last-child { border-bottom: none; }
        .cost-name {
            width: 120px;
            font-size: 12px;
            color: #aaa;
            flex-shrink: 0;
        }
        .cost-reason {
            font-size: 11px;
            color: #666;
            line-height: 1.5;
        }

        /* 关键难点展开 */
        .difficulty-expand {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .difficulty-detail {
            margin-bottom: 8px;
        }
        .difficulty-detail-label {
            font-size: 10px;
            color: #555;
            margin-bottom: 2px;
        }
        .difficulty-detail-text {
            font-size: 11px;
            color: #888;
            line-height: 1.5;
        }

        /* 条件清单详情 */
        .condition-detail {
            background: rgba(255,255,255,0.02);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
        }
        .condition-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .condition-layer {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            background: rgba(255,255,255,0.05);
            color: #666;
        }
        .condition-stage {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            background: rgba(74,158,255,0.1);
            color: #4a9eff;
        }
        .condition-state {
            font-size: 12px;
            color: #888;
            margin-bottom: 6px;
            line-height: 1.5;
        }
        .condition-action {
            font-size: 11px;
            color: #22c55e;
            line-height: 1.5;
        }
        .condition-meta {
            display: flex;

    <script type="module">
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    // ============================================================
    // 全局状态
    // ============================================================
    let scenes = [];
    let filteredScenes = [];
    let currentSceneIndex = -1;
    let Graph;
    let composer;
    let nodeObjects = new Map();
    let hoveredNode = null;
    let animationId;

    // 行业颜色 (色盲友好高对比度)
    const industryColors = {};
    const colorPalette = [
        '#4a9eff', '#22c55e', '#eab308', '#ef4444', '#a855f7',
        '#ec4899', '#14b8a6', '#f97316', '#6366f1', '#84cc16',
        '#06b6d4', '#f43f5e', '#8b5cf6', '#10b981', '#fbbf24',
        '#64748b', '#78716c', '#0ea5e9', '#d946ef', '#f472b6'
    ];

    // 评分维度
    const scoreDims = {
        labor_urgency: '紧迫',
        scale_potential: '规模',
        superhuman_value: '超人',
        operation_complexity: '复杂',
        structure_level: '结构',
        fault_tolerance: '容错',
        takt_pressure: '节拍'
    };

    const scoreNamesFull = {
        labor_urgency: '人工替代紧迫性',
        scale_potential: '规模化潜力',
        superhuman_value: '超人类价值',
        operation_complexity: '操作复杂度',
        structure_level: '结构化程度',
        fault_tolerance: '容错空间',
        takt_pressure: '节拍压力'
    };

    // 筛选状态
    const filters = { industries: new Set(), scores: {} };
    Object.keys(scoreDims).forEach(k => filters.scores[k] = [1, 5]);

    // 相机初始距离（拉远视角，展示全局星图）
    const CAMERA_DIST = 2000;

    // ============================================================
    // 初始化
    // ============================================================
    async function init() {
        const response = await fetch('scenes-data-full.json');
        scenes = await response.json();

        // 分配行业颜色
        const industries = [...new Set(scenes.map(s => s.source_major_name))].sort();
        industries.forEach((ind, i) => {
            industryColors[ind] = colorPalette[i % colorPalette.length];
            filters.industries.add(ind);
        });

        // 为每个场景设置随机相位 (用于脉动动画)
        scenes.forEach((scene, index) => {
            scene.id = index;
            scene._phase = Math.random() * Math.PI * 2;
        });

        initFilters();
        applyFilters();
        initGraph();
        setupBloom();
        animate();

        document.addEventListener('keydown', handleKeyDown);
    }

    // ============================================================
    // 3D Force Graph 初始化
    // ============================================================
    function initGraph() {
        const container = document.getElementById('graph-container');

        Graph = ForceGraph3D()(container)
            .graphData({ nodes: filteredScenes, links: [] })
            .backgroundColor('#050510')
            .showNavInfo(false)
            // 自定义节点渲染
            .nodeThreeObject(createNodeObject)
            .nodeThreeObjectExtend(false)
            // 漂浮效果 - 永不收敛
            .d3AlphaDecay(0.005)
            .d3VelocityDecay(0.3)
            .cooldownTicks(Infinity)
            .cooldownTime(Infinity)
            // 交互
            .onNodeHover(handleNodeHover)
            .onNodeClick(handleNodeClick)
            // 相机
            .cameraPosition({ x: 0, y: 0, z: CAMERA_DIST });

        // 设置排斥力
        Graph.d3Force('charge').strength(-50);
        // 禁用中心力和连线力
        Graph.d3Force('center', null);
        Graph.d3Force('link', null);

        // 添加星空背景
        addStarfield();
    }

    // ============================================================
    // 节点渲染 (核心球体 + 光晕Sprite + 数据状态环)
    // ============================================================
    // 数据状态颜色
    const dataStatusColors = {
        full: '#fbbf24',      // 金色: L3+指南
        l3_only: '#4a9eff',   // 蓝色: 只有L3
        guide_only: '#22c55e', // 绿色: 只有指南
        basic: null           // 无额外标识
    };

    function createNodeObject(node) {
        const color = new THREE.Color(industryColors[node.source_major_name] || '#4a9eff');
        const scaleScore = node.scores?.scale_potential?.score || 3;
        const valueScore = getValueScore(node);

        // 节点大小映射: 1分=3, 5分=10
        const radius = 3 + (scaleScore - 1) * 1.75;

        // 核心球体
        const coreGeom = new THREE.SphereGeometry(radius, 24, 24);
        const coreMat = new THREE.MeshBasicMaterial({
            color: color,
            transparent: true,
            opacity: 0.85 + valueScore * 0.03
        });
        const core = new THREE.Mesh(coreGeom, coreMat);

        // 外层光晕 (径向渐变Canvas纹理)
        const glowCanvas = createGlowTexture(color);
        const glowTexture = new THREE.CanvasTexture(glowCanvas);
        const glowMat = new THREE.SpriteMaterial({
            map: glowTexture,
            transparent: true,
            opacity: 0.3 + valueScore * 0.06,
            blending: THREE.AdditiveBlending
        });
        const glow = new THREE.Sprite(glowMat);
        const glowSize = radius * (3.5 + valueScore * 0.3);
        glow.scale.set(glowSize, glowSize, 1);

        const group = new THREE.Group();
        group.add(core);
        group.add(glow);

        // 数据状态环 (有数据的场景添加外环标识)
        const statusColor = dataStatusColors[node.data_status];
        if (statusColor) {
            const ringGeom = new THREE.RingGeometry(radius * 1.3, radius * 1.5, 32);
            const ringMat = new THREE.MeshBasicMaterial({
                color: new THREE.Color(statusColor),
                transparent: true,
                opacity: 0.8,
                side: THREE.DoubleSide
            });
            const ring = new THREE.Mesh(ringGeom, ringMat);
            group.add(ring);

            // 额外光晕强调
            const statusGlowCanvas = createGlowTexture(new THREE.Color(statusColor));
            const statusGlowTexture = new THREE.CanvasTexture(statusGlowCanvas);
            const statusGlowMat = new THREE.SpriteMaterial({
                map: statusGlowTexture,
                transparent: true,
                opacity: 0.25,
                blending: THREE.AdditiveBlending
            });
            const statusGlow = new THREE.Sprite(statusGlowMat);
            const statusGlowSize = radius * 5;
            statusGlow.scale.set(statusGlowSize, statusGlowSize, 1);
            group.add(statusGlow);
        }

        // 存储引用
        nodeObjects.set(node.id, {
            group, core, glow, coreMat, glowMat,
            baseRadius: radius,
            baseGlowSize: glowSize,
            baseOpacity: 0.85 + valueScore * 0.03,
            baseGlowOpacity: 0.3 + valueScore * 0.06
        });

        return group;
    }

    function createGlowTexture(color) {
        const size = 128;
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');

        const gradient = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
        const r = Math.floor(color.r * 255);
        const g = Math.floor(color.g * 255);
        const b = Math.floor(color.b * 255);
        gradient.addColorStop(0, `rgba(${r},${g},${b},1)`);
        gradient.addColorStop(0.3, `rgba(${r},${g},${b},0.4)`);
        gradient.addColorStop(0.6, `rgba(${r},${g},${b},0.1)`);
        gradient.addColorStop(1, 'rgba(0,0,0,0)');

        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, size, size);
        return canvas;
    }

    function getValueScore(node) {
        const s = node.scores || {};
        return ((s.labor_urgency?.score || 3) + (s.scale_potential?.score || 3) + (s.superhuman_value?.score || 3)) / 3;
    }

    // ============================================================
    // 星空背景 (2000颗粒子)
    // ============================================================
    function addStarfield() {
        const scene = Graph.scene();
        const starCount = 2000;
        const radius = 2000;

        const positions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            positions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
            positions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
            positions[i * 3 + 2] = radius * Math.cos(phi);
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const material = new THREE.PointsMaterial({
            color: 0xffffff,
            size: 1.5,
            transparent: true,
            opacity: 0.6,
            sizeAttenuation: true
        });
        scene.add(new THREE.Points(geometry, material));
    }

    // ============================================================
    // Bloom 后处理
    // ============================================================
    function setupBloom() {
        const renderer = Graph.renderer();
        const scene = Graph.scene();
        const camera = Graph.camera();

        composer = new EffectComposer(renderer);

        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);

        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            1.5,   // strength
            0.8,   // radius
            0.2    // threshold
        );
        composer.addPass(bloomPass);

        // 替换默认渲染
        Graph.postProcessingComposer(composer);
    }

    // ============================================================
    // 动画循环 (脉动效果)
    // ============================================================
    let animationTime = 0;

    function animate() {
        animationId = requestAnimationFrame(animate);
        animationTime += 0.016;

        // 光晕脉动: scale 在 0.95-1.05 之间
        nodeObjects.forEach((obj, nodeId) => {
            const scene = scenes.find(s => s.id === nodeId);
            if (!scene || !obj.glow) return;

            const pulse = 0.95 + 0.1 * Math.sin(animationTime * 1.5 + scene._phase);
            const size = obj.baseGlowSize * pulse;
            obj.glow.scale.set(size, size, 1);
        });
    }

    // ============================================================
    // 交互: 悬停
    // ============================================================
    function getNodeScreenPosition(node) {
        const camera = Graph.camera();
        const container = document.getElementById('graph-container');
        const rect = container.getBoundingClientRect();

        const vector = new THREE.Vector3(node.x || 0, node.y || 0, node.z || 0);
        vector.project(camera);

        const x = (vector.x * 0.5 + 0.5) * rect.width + rect.left;
        const y = (-vector.y * 0.5 + 0.5) * rect.height + rect.top;

        return { x, y };
    }

    function handleNodeHover(node) {
        const panel = document.getElementById('hover-panel');

        if (!node) {
            // 恢复所有节点
            nodeObjects.forEach(obj => {
                obj.coreMat.opacity = obj.baseOpacity;
                obj.glowMat.opacity = obj.baseGlowOpacity;
                obj.core.scale.set(1, 1, 1);
            });
            hoveredNode = null;
            panel.classList.remove('visible');
            document.getElementById('graph-container').style.cursor = 'grab';
            return;
        }

        hoveredNode = node;

        // 被悬停节点放大1.5x，其他透明度降至0.2
        nodeObjects.forEach((obj, nodeId) => {
            if (nodeId === node.id) {
                obj.coreMat.opacity = 1;
                obj.glowMat.opacity = obj.baseGlowOpacity * 2;
                obj.core.scale.set(1.5, 1.5, 1.5);
            } else {
                obj.coreMat.opacity = 0.2;
                obj.glowMat.opacity = 0.05;
            }
        });

        // 计算节点屏幕位置并定位卡片（不遮挡节点）
        const screenPos = getNodeScreenPosition(node);
        const panelWidth = 280;
        const panelHeight = 220;
        const offsetX = 30;
        const offsetY = 25;

        // 优先显示在节点右下方
        let left = screenPos.x + offsetX;
        let top = screenPos.y + offsetY;

        // 右侧空间不足，显示在左下方
        if (left + panelWidth > window.innerWidth - 20) {
            left = screenPos.x - panelWidth - offsetX;
        }
        // 下方空间不足，显示在上方
        if (top + panelHeight > window.innerHeight - 20) {
            top = screenPos.y - panelHeight - offsetY;
        }
        // 左侧空间也不足，强制右侧
        if (left < 20) {
            left = screenPos.x + offsetX;
        }
        // 上方空间也不足，强制下方
        if (top < 20) {
            top = screenPos.y + offsetY;
        }

        panel.style.left = left + 'px';
        panel.style.top = top + 'px';

        // 更新面板
        document.getElementById('hover-name-zh').textContent = node.scene_name_zh || '';
        document.getElementById('hover-name-en').textContent = node.scene_name_en || '';

        document.getElementById('hover-tags').innerHTML = `
            <span class="hover-tag" style="background:${industryColors[node.source_major_name]}">${node.source_major_name || ''}</span>
            <span class="hover-tag" style="background:rgba(255,255,255,0.08)">${node.process_step || ''}</span>
        `;

        // 7维评分色块
        const scoresHtml = Object.entries(scoreDims).map(([key, label]) => {
            const score = node.scores?.[key]?.score || 0;
            const cls = score <= 2 ? 'score-low' : (score === 3 ? 'score-mid' : 'score-high');
            return `<div class="hover-score-block ${cls}"><div class="score-val">${score}</div><div class="score-lbl">${label}</div></div>`;
        }).join('');
        document.getElementById('hover-scores').innerHTML = scoresHtml;

        panel.classList.add('visible');
        document.getElementById('graph-container').style.cursor = 'pointer';
    }

    // ============================================================
    // 交互: 点击
    // ============================================================
    function handleNodeClick(node) {
        if (!node) return;

        currentSceneIndex = filteredScenes.indexOf(node);

        // 相机飞向节点 (1秒过渡，距离30)
        const offset = 30;
        Graph.cameraPosition(
            { x: node.x + offset, y: node.y, z: node.z + offset },
            { x: node.x, y: node.y, z: node.z },
            1000
        );

        // 延迟显示详情
        setTimeout(() => showDetail(node), 600);
    }

    // ============================================================
    // 键盘
    // ============================================================
    function handleKeyDown(e) {
        const overlay = document.getElementById('detail-overlay');
        const isDetailOpen = overlay.classList.contains('visible');

        if (isDetailOpen) {
            if (e.key === 'ArrowLeft') navigateScene(-1);
            else if (e.key === 'ArrowRight') navigateScene(1);
            else if (e.key === 'Escape') closeDetail();
        } else {
            if (e.key === 'r' || e.key === 'R') resetView();
            else if (e.key === 'f' || e.key === 'F') toggleFullscreen();
        }
    }

    window.resetView = function() {
        Graph.cameraPosition({ x: 0, y: 0, z: CAMERA_DIST }, { x: 0, y: 0, z: 0 }, 1000);
    };

    window.toggleFullscreen = function() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen();
        } else {
            document.exitFullscreen();
        }
    };

    // ============================================================
    // 详情卡片
    // ============================================================
    let currentDetailScene = null;

    function showDetail(scene) {
        currentDetailScene = scene;

        document.getElementById('detail-title-zh').textContent = scene.scene_name_zh || '';
        document.getElementById('detail-title-en').textContent = scene.scene_name_en || '';

        // 数据状态标识
        const badge = document.getElementById('detail-data-badge');
        if (scene.data_status === 'full') {
            badge.textContent = 'L3+指南';
            badge.className = 'data-badge badge-full';
            badge.style.display = 'inline-block';
        } else if (scene.data_status === 'l3_only') {
            badge.textContent = 'L3';
            badge.className = 'data-badge badge-l3';
            badge.style.display = 'inline-block';
        } else if (scene.data_status === 'guide_only') {
            badge.textContent = '指南';
            badge.className = 'data-badge badge-guide';
            badge.style.display = 'inline-block';
        } else {
            badge.style.display = 'none';
        }

        const industryTag = document.getElementById('detail-industry-tag');
        industryTag.textContent = scene.source_major_name || '';
        industryTag.style.background = industryColors[scene.source_major_name];
        industryTag.style.color = '#fff';

        document.getElementById('detail-process-tag').textContent = scene.process_step || '';
        document.getElementById('detail-description').textContent = scene.scene_description || '';
        document.getElementById('detail-rationale').textContent = scene.selection_rationale || '';

        // 工序链
        const chainDiv = document.getElementById('detail-chain');
        const steps = scene.industry_chain?.split('→') || [];

    function getQuadrant(scene) {
        const s = scene.scores || {};
        const difficulty = (
            (s.operation_complexity?.score || 3) +
            (6 - (s.structure_level?.score || 3)) +
            (6 - (s.fault_tolerance?.score || 3)) +
            (6 - (s.takt_pressure?.score || 3))
        ) / 4;
        const value = (
            (s.labor_urgency?.score || 3) +
            (s.scale_potential?.score || 3) +
            (s.superhuman_value?.score || 3)
        ) / 3;

        if (difficulty < 3 && value >= 3) return '快速落地区';
        if (difficulty >= 3 && value >= 3) return '战略攻坚区';
        if (difficulty < 3 && value < 3) return '锦上添花区';
        return '暂缓观望区';
    }

    function drawDetailRadar(scene) {
        const canvas = document.getElementById('detail-radar');
        const ctx = canvas.getContext('2d');
        const center = 140;
        const radius = 105;

        ctx.clearRect(0, 0, 280, 280);

        const dims = Object.keys(scoreDims);
        const dimNames = Object.values(scoreDims);
        const angles = dims.map((_, i) => (i * 2 * Math.PI / 7) - Math.PI / 2);

        // 网格
        ctx.strokeStyle = 'rgba(255,255,255,0.06)';
        ctx.lineWidth = 1;
        for (let r = 1; r <= 5; r++) {
            ctx.beginPath();
            angles.forEach((angle, i) => {
                const x = center + Math.cos(angle) * (radius * r / 5);
                const y = center + Math.sin(angle) * (radius * r / 5);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.closePath();
            ctx.stroke();
        }

        // 轴线
        angles.forEach(angle => {
            ctx.beginPath();
            ctx.moveTo(center, center);
            ctx.lineTo(center + Math.cos(angle) * radius, center + Math.sin(angle) * radius);
            ctx.stroke();
        });

        // 数据填充
        const color = industryColors[scene.source_major_name] || '#4a9eff';
        ctx.fillStyle = color + '30';
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;

        ctx.beginPath();
        dims.forEach((dim, i) => {
            const score = scene.scores?.[dim]?.score || 0;
            const x = center + Math.cos(angles[i]) * (radius * score / 5);
            const y = center + Math.sin(angles[i]) * (radius * score / 5);
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        });
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        // 标签
        ctx.fillStyle = '#777';
        ctx.font = '11px sans-serif';
        ctx.textAlign = 'center';
        angles.forEach((angle, i) => {
            const x = center + Math.cos(angle) * (radius + 18);
            const y = center + Math.sin(angle) * (radius + 18);
            ctx.fillText(dimNames[i], x, y + 4);
        });
    }

    function initFilters() {
        const industryList = document.getElementById('industry-list');
        const industries = [...new Set(scenes.map(s => s.source_major_name))].sort();

        industryList.innerHTML = industries.map(ind => {
            const count = scenes.filter(s => s.source_major_name === ind).length;
            return `
                <label class="industry-item">
                    <input type="checkbox" class="industry-checkbox" value="${ind}" checked onchange="toggleIndustry('${ind}')">
                    <span class="industry-color" style="background:${industryColors[ind]}"></span>
                    <span class="industry-name">${ind.length > 8 ? ind.substring(0, 8) + '…' : ind}</span>
                    <span class="industry-count">${count}</span>
                </label>
            `;
        }).join('');

        const scoreFilters = document.getElementById('score-filters');
        scoreFilters.innerHTML = Object.entries(scoreDims).map(([key, name]) => `
            <div class="range-slider">
                <div class="range-header">
                    <span class="range-name">${name}</span>
                    <span class="range-value" id="range-${key}-value">1-5</span>
                </div>
                <input type="range" min="1" max="5" value="1" id="range-${key}-min" onchange="updateScoreFilter('${key}')">
                <input type="range" min="1" max="5" value="5" id="range-${key}-max" onchange="updateScoreFilter('${key}')">
            </div>
        `).join('');
    }

    window.toggleIndustry = function(industry) {
        if (filters.industries.has(industry)) {
            filters.industries.delete(industry);
        } else {
            filters.industries.add(industry);
        }
        applyFilters();
        updateGraph();
    };

    window.updateScoreFilter = function(key) {
        const minVal = parseInt(document.getElementById(`range-${key}-min`).value);
        const maxVal = parseInt(document.getElementById(`range-${key}-max`).value);
        filters.scores[key] = [Math.min(minVal, maxVal), Math.max(minVal, maxVal)];
        document.getElementById(`range-${key}-value`).textContent = `${filters.scores[key][0]}-${filters.scores[key][1]}`;
        applyFilters();
        updateGraph();
    };

    function applyFilters() {
        filteredScenes = scenes.filter(scene => {
            if (!filters.industries.has(scene.source_major_name)) return false;
            for (const [key, [min, max]] of Object.entries(filters.scores)) {
                const score = scene.scores?.[key]?.score || 0;
                if (score < min || score > max) return false;
            }
            return true;
        });
        updateStats();
    }

    function updateStats() {
        document.getElementById('stats-count').textContent = `${filteredScenes.length} / ${scenes.length}`;

        let q1 = 0, q2 = 0, q3 = 0, q4 = 0;
        let full = 0, l3Only = 0, guideOnly = 0, basic = 0;

        filteredScenes.forEach(scene => {
            const q = getQuadrant(scene);
            if (q === '快速落地区') q1++;
            else if (q === '战略攻坚区') q2++;
            else if (q === '锦上添花区') q3++;
            else q4++;

            // 数据状态统计
            if (scene.data_status === 'full') full++;
            else if (scene.data_status === 'l3_only') l3Only++;
            else if (scene.data_status === 'guide_only') guideOnly++;
            else basic++;
        });

        document.getElementById('stats-q1').textContent = q1;
        document.getElementById('stats-q2').textContent = q2;
        document.getElementById('stats-q3').textContent = q3;
        document.getElementById('stats-q4').textContent = q4;

        document.getElementById('stats-full').textContent = full;
        document.getElementById('stats-l3').textContent = l3Only;
        document.getElementById('stats-guide').textContent = guideOnly;
        document.getElementById('stats-basic').textContent = basic;
    }

    function updateGraph() {
        nodeObjects.clear();
        if (Graph) {
            Graph.graphData({ nodes: filteredScenes, links: [] });
        }
    }

    window.togglePanel = function() {
        document.getElementById('filter-panel').classList.toggle('collapsed');
    };

    // 启动
    init();
    </script>
</body>
